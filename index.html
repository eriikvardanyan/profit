        .window, .data-table-container, .settings-window {

            font-size: 24px; text-align: center; outline: none;
        }
        .btn-check { background: #000; color: white; border: none; padding: 0 20px; border-radius: 12px; cursor: pointer; }

        .history-list { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; padding-top: 10px; }
        .history-item { background: rgba(0,0,0,0.05); padding: 3px 8px; border-radius: 5px; font-size: 11px; }

            text-shadow: 0 2px 10px rgba(0,0,0,0.2);

        @keyframes floatBubble {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }

        .mode-separator { height: 2px; background: #000; margin: 5px 0; border-radius: 2px; opacity: 0.8; }

        .settings-content { padding: 20px; }
        .setting-row { margin-bottom: 20px; }
        .setting-label { display: block; margin-bottom: 10px; font-weight: 700; font-size: 14px; }

            background: white; cursor: pointer; font-size: 13px; font-weight: 600;
            color: #000;

            background: #000;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function playTickSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.03);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.03);
    }

    function generateTable() {
        const table = document.getElementById('html-data-table');
        let html = '';
        for (let i = 0; i < data.length; i += 20) {
            let chunk = data.slice(i, i + 20);
            
            html += '<tr>';
            for (let idx = 0; idx < chunk.length; idx++) {
                let cellClass = `val-top ${(i + idx + 1) % 5 === 0 ? 'highlight-cell' : ''}`;
                html += `<td class="${cellClass}">${chunk[idx][0]}</td>`;
            }
            html += '</tr>';

            html += '<tr>';
            for (let idx = 0; idx < chunk.length; idx++) {
                let cellClass = `val-bottom ${(i + idx + 1) % 5 === 0 ? 'highlight-cell' : ''}`;
                html += `<td class="${cellClass}">${chunk[idx][1]}</td>`;
            }
            html += '</tr>';

            html += '<tr style="height:15px"><td colspan="20"></td></tr>';
        }
        table.innerHTML = html;
    }
    generateTable();

    function showProfitTable() { 
        document.getElementById('profit-table').style.display = 'block'; 
        document.getElementById('table-toggle-btn').style.display = 'none'; 
    }

    function hideProfitTable() {
        document.getElementById('profit-table').style.display = 'none';
        document.getElementById('table-toggle-btn').style.display = 'inline-block';
    }

    function fillOptions() {
        const opt5 = document.getElementById('opt-5');
        let count = 1;
        for(let i=0; i<85; i+=5) {
            let endIdx = Math.min(i + 5, 85);
            let label = `${data[i][0]} - ${data[endIdx-1][0]}`;
            let fullLabel = `${count}) ${label}`;
            let div = document.createElement('div');
            div.style.padding = '8px'; div.style.cursor = 'pointer'; div.style.borderBottom = '1px solid #eee';
            div.innerHTML = `<span style="color:#888; margin-right:5px;">${count})</span> ${label}`;
            div.onclick = (e) => { e.stopPropagation(); lastStartIndex = i; lastRowIndex = -1; selectRange(i, endIdx, fullLabel, 'mode-5'); };
            opt5.appendChild(div);
            if (count % 4 === 0 && i + 5 < 85) { let sep = document.createElement('div'); sep.className = 'mode-separator'; opt5.appendChild(sep); }
            count++;
        }
        const optRow = document.getElementById('opt-row');
        const ranges = [[0,20], [20,40], [40,60], [60,85]];
        ranges.forEach((r, idx) => {
            let label = `Տող ${idx+1} (${data[r[0]][0]}-${data[r[1]-1][0]})`;
            let div = document.createElement('div');
            div.style.padding = '8px'; div.style.cursor = 'pointer'; div.style.borderBottom = '1px solid #eee';
            div.innerHTML = `<span style="color:#888; margin-right:5px;">${idx+1})</span> ${label}`;
            div.onclick = (e) => { e.stopPropagation(); lastStartIndex = -1; lastRowIndex = idx; selectRange(r[0], r[1], label, 'mode-row'); };
            optRow.appendChild(div);
        });
        let blackLabel = "Սևեր";
        let blackDiv = document.createElement('div');
        blackDiv.style.padding = '8px'; blackDiv.style.cursor = 'pointer'; blackDiv.style.fontWeight = 'bold';
        blackDiv.innerHTML = `<span style="color:#888; margin-right:5px;">5)</span> ${blackLabel}`;
        blackDiv.onclick = (e) => { 
            e.stopPropagation(); lastStartIndex = -1; lastRowIndex = 4;
            originalPool = data.filter((_, index) => (index + 1) % 5 === 0);
            currentModeLabel = blackLabel;
            document.querySelectorAll('.itc-select').forEach(el => el.classList.remove('selected-mode'));
            document.getElementById('mode-row').classList.add('selected-mode');
            document.getElementById('label-row').innerText = blackLabel;
            toggleDropdown('opt-row');
        };
        optRow.appendChild(blackDiv);
    }
    fillOptions();

    function toggleDropdown(id) {
        document.querySelectorAll('.itc-select__dropdown').forEach(d => { if(d.id !== id) d.classList.add('hidden'); });
        document.getElementById(id).classList.toggle('hidden');
    }

    function selectRange(start, end, label, parentId) {
        originalPool = data.slice(start, end);
        currentModeLabel = label;
        document.querySelectorAll('.itc-select').forEach(el => el.classList.remove('selected-mode'));
        document.getElementById(parentId).classList.add('selected-mode');
        if(parentId === 'mode-5') document.getElementById('label-5').innerText = label;
        if(parentId === 'mode-row') document.getElementById('label-row').innerText = label;
        document.querySelectorAll('.itc-select__dropdown').forEach(d => d.classList.add('hidden'));
    }

    function openSettings() { 
        document.getElementById('settings-overlay').classList.remove('hidden');
        document.getElementById('settings-window').style.display = 'block'; 
    }
    function closeSettings() { 
        document.getElementById('settings-overlay').classList.add('hidden');
        document.getElementById('settings-window').style.display = 'none'; 
    }

    function setTimerMode(enabled) {
        useTimer = enabled;
        document.getElementById('mode-with-timer').classList.toggle('active', enabled);
        document.getElementById('mode-no-timer').classList.toggle('active', !enabled);
        document.getElementById('timer-options').classList.toggle('hidden', !enabled);
        if (!enabled) {
            stopTimer();
            document.getElementById('timer-display').classList.add('hidden');
        }
    }

    function setTimerSeconds(s) {
        timerLimit = s;
        ['t-5', 't-7', 't-10'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.remove('active');
        });
        const activeBtn = document.getElementById('t-' + s);
        if (activeBtn) activeBtn.classList.add('active');
    }

    function startTimer() {
        if (!useTimer) {
            document.getElementById('timer-display').classList.add('hidden');
            return;
        }
        clearInterval(timerInterval);
        timeLeft = timerLimit;
        const timerDisplay = document.getElementById('timer-display');
        timerDisplay.classList.remove('hidden');
        timerDisplay.innerText = timeLeft.toFixed(1);
        
        let lastInt = Math.ceil(timeLeft);
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            if (Math.ceil(timeLeft) < lastInt) {
                playTickSound();
                lastInt = Math.ceil(timeLeft);
            }
            if (timeLeft <= 0) {
                timeLeft = 0;
                clearInterval(timerInterval);
                handleWrong();
            }
            timerDisplay.innerText = Math.max(0, timeLeft).toFixed(1);
        }, 100);
    }

    function stopTimer() { clearInterval(timerInterval); }

    function goToSetup() {
        stopTimer();
        document.getElementById('timer-display').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
        document.getElementById('setup-title').classList.remove('hidden');
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('game-status').classList.add('hidden');
        document.getElementById('round-stats').classList.add('hidden');
        document.getElementById('current-mode-display').classList.add('hidden');
        document.getElementById('back-to-setup').classList.add('hidden');
        document.getElementById('table-toggle-btn').style.display = 'inline-block';
        comboCount = 0;
    }

    function initGame() {
        if (originalPool.length === 0) return alert("Խնդրում ենք ընտրել ռեժիմը!");
        document.getElementById('profit-table').style.display = 'none';
        document.getElementById('table-toggle-btn').style.display = 'none';
        document.getElementById('setup-title').classList.add('hidden');
        lives = 3; comboCount = 0; mistakes = [];
        activePool = [...originalPool];
        
        stopTimer();
        if(!useTimer) document.getElementById('timer-display').classList.add('hidden');
        
        updateUI();
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').style.display = 'flex';
        document.getElementById('game-status').classList.remove('hidden');
        document.getElementById('round-stats').classList.remove('hidden');
        document.getElementById('back-to-setup').classList.remove('hidden');
        document.getElementById('current-mode-display').innerText = currentModeLabel;
        document.getElementById('current-mode-display').classList.remove('hidden');
        document.getElementById('history-list').innerHTML = '';
        document.getElementById('progress-bar').style.width = '0%';
        document.getElementById('target-display').classList.remove('end-status');
        document.getElementById('input-area').classList.remove('hidden');
        document.getElementById('end-buttons').classList.add('hidden');
        nextRound();
    }

    function updateUI() {
        document.getElementById('hearts-display').innerText = "❤️".repeat(lives);
        document.getElementById('count-display').innerText = `Խաղ: ${gamesPlayed}`;
        document.getElementById('round-counter-main').innerText = `${originalPool.length - activePool.length}/${originalPool.length}`;
        const comboEl = document.getElementById('combo-display');
        
        const triggerCombos = [3, 5, 10, 15, 20, 25, 30, 40, 50, 60, 70, 80];
        
        if (triggerCombos.includes(comboCount)) {
            comboEl.innerText = `🔥 ${comboCount}`;
            comboEl.style.display = 'block';
        } else if (comboCount === 0) {
            comboEl.style.display = 'none';
        }
    }

    function nextRound() {
        const progress = ((originalPool.length - activePool.length) / originalPool.length) * 100;
        document.getElementById('progress-bar').style.width = progress + '%';
        if (activePool.length === 0) return endGame(true);
        const randomIndex = Math.floor(Math.random() * activePool.length);
        currentPair = activePool.splice(randomIndex, 1)[0];
        const showTop = Math.random() > 0.5;
        const displayVal = showTop ? currentPair[0] : currentPair[1];
        const targetVal = showTop ? currentPair[1] : currentPair[0];
        const display = document.getElementById('target-display');
        display.innerText = displayVal;
        display.dataset.answer = targetVal;
        const input = document.getElementById('user-input');
        input.value = ''; input.className = ''; input.focus();
        updateUI();
        startTimer();
    }

    function showBubbleFeedback() {
        const inputArea = document.getElementById('input-area');
        const rect = inputArea.getBoundingClientRect();
        const bubble = document.createElement('div');
        bubble.className = 'bubble-feedback';
        bubble.innerText = "+1";
        bubble.style.left = (rect.left + rect.width/2) + 'px';
        bubble.style.top = rect.top + 'px';
        document.body.appendChild(bubble);
        setTimeout(() => bubble.remove(), 2500);
        playPlopSound();
    }

    function checkAnswer() {
        const input = document.getElementById('user-input');
        const display = document.getElementById('target-display');
        const userAnswer = input.value.trim().replace(',', '.');
        const correctAnswer = String(display.dataset.answer);
        
        if (userAnswer === correctAnswer) {
            stopTimer();
            input.classList.add('correct');
            comboCount++;
            showBubbleFeedback();
            addToHistory(display.innerText, correctAnswer);
            setTimeout(nextRound, 600);
        } else {
            handleWrong();
        }
    }

    function handleWrong() {
        stopTimer();
        playErrorSound();
        const input = document.getElementById('user-input');
        const display = document.getElementById('target-display');
        const correctAnswer = String(display.dataset.answer);
        
        lives--;
        comboCount = 0;
        if (navigator.vibrate) navigator.vibrate(500);
        mistakes.push(`${display.innerText} ➔ ${correctAnswer}`);
        updateUI();
        input.classList.add('wrong');
        setTimeout(() => {
            input.classList.remove('wrong');
            if(lives > 0) nextRound();
            else endGame(false);
        }, 600);
    }

    function endGame(win) {
        stopTimer();
        const display = document.getElementById('target-display');
        display.classList.add('end-status');
        display.innerText = win ? "ՀԱՂԹԱՆԱԿ" : "ՊԱՐՏՈՒԹՅՈՒՆ";
        if (mistakes.length > 0) {
            const list = document.getElementById('history-list');
            const mContainer = document.createElement('div');
            mContainer.className = 'mistakes-container';
            mContainer.innerHTML = `<strong>Սխալներիդ ուղղումը:</strong><br>${mistakes.join('<br>')}`;
            list.prepend(mContainer);
        }
        document.getElementById('input-area').classList.add('hidden');
        document.getElementById('end-buttons').classList.remove('hidden');
        document.getElementById('timer-display').classList.add('hidden');
        document.getElementById('restart-btn').onclick = () => { gamesPlayed++; initGame(); };
        
        const nextBtn = document.getElementById('next-btn');
        nextBtn.classList.add('hidden');
        if (lastStartIndex !== -1 && lastStartIndex + 5 < 85) {
            nextBtn.classList.remove('hidden');
            nextBtn.onclick = () => {
                lastStartIndex += 5;
                let endIdx = Math.min(lastStartIndex + 5, 85);
                selectRange(lastStartIndex, endIdx, `${(lastStartIndex/5)+1}) ${data[lastStartIndex][0]}-${data[endIdx-1][0]}`, 'mode-5');
                gamesPlayed++; initGame();
            };
        } else if (lastRowIndex !== -1 && lastRowIndex < 4) {
            nextBtn.classList.remove('hidden');
            nextBtn.onclick = () => {
                lastRowIndex++;
                if (lastRowIndex < 4) {
                    const ranges = [[0,20], [20,40], [40,60], [60,85]];
                    let r = ranges[lastRowIndex];
                    selectRange(r[0], r[1], `Տող ${lastRowIndex+1} (${data[r[0]][0]}-${data[r[1]-1][0]})`, 'mode-row');
                } else {
                    originalPool = data.filter((_, index) => (index + 1) % 5 === 0);
                    currentModeLabel = "Սևեր";
                    document.getElementById('label-row').innerText = "Սևեր";
                }
                gamesPlayed++; initGame();
            };
        }
        if(win) startAutoFireworks();
    }

    function addToHistory(q, a) {
        const list = document.getElementById('history-list');
        const div = document.createElement('div');
        div.className = 'history-item'; div.innerText = `${q} → ${a}`;
        list.prepend(div);
    }
    document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });
    
    const canvas = document.getElementById("magicCanvas");
    const ctx = canvas.getContext("2d");
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener("resize", resize); resize();
    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; 
            const angle = Math.random() * Math.PI * 2;
            const force = Math.random() * 6 + 1;
            this.vx = Math.cos(angle) * force; this.vy = Math.sin(angle) * force; 
            this.life = 100; this.color = color || `rgba(255,214,10,`;
        }
        update() { this.x += this.vx; this.y += this.vy; this.vy += 0.05; this.life -= 1.5; }
        draw() { ctx.fillStyle = `${this.color}${this.life/100})`; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill(); }
    }
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
    function createFirework(x, y) {
        const colors = ['rgba(255,214,10,', 'rgba(0,122,255,', 'rgba(52,199,89,', 'rgba(255,59,48,', 'rgba(175,82,222,'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        for(let i=0; i<60; i++) particles.push(new Particle(x, y, color));
    }
    function startAutoFireworks() {
        let startTime = Date.now();
        const interval = setInterval(() => {
            if (Date.now() - startTime > 5000) return clearInterval(interval);
            createFirework(Math.random() * canvas.width, Math.random() * (canvas.height * 0.7));
        }, 300); 
    }
</script>
