    <title>Profit Quiz</title>
    <style>
        :root {
            --win-accent: #007aff;
            --win-success: #34c759;
            --win-error: #ff3b30;
            --glass: rgba(255, 255, 255, 0.85);
            --radius: 18px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: url('./beck-stars.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 10px 40px 10px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .navbar {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            color: white;
            font-size: 13px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        
        @media (max-width: 480px) {
            .navbar {
                font-size: 10px;
                padding: 8px 10px;
            }
        }

        .navbar a { color: #007aff;  font-weight: 600; }
        .version-tag { opacity: 0.7; font-family: monospace; }
        .copyright-tag { text-align: right; }

        #magicCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999;
        }

        .site-title {
            color: white;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .window, .data-table-container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--radius);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 10;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .data-table-container {
            max-width: 900px;
            display: none;
        }

        .window-header {
            background: rgba(255,255,255,0.5);
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .progress-container {
            width: 100%; height: 5px; background: rgba(0,0,0,0.05);
            position: absolute; top: 40px; left: 0;
        }
        #progress-bar {
            width: 0%; height: 100%; background: var(--win-success);
            transition: width 0.4s ease;
        }

        .mac-dots { display: flex; gap: 8px; align-items: center; }
        .dot { width: 11px; height: 11px; border-radius: 50%; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }
        
        #current-mode-display {
            font-size: 11px; font-weight: 600; color: #555;
            margin-left: 10px; background: rgba(0,0,0,0.05);
            padding: 2px 8px; border-radius: 5px;
        }

        .game-info { display: flex; gap: 10px; align-items: center; }
        .hearts { color: #ff3b30; font-size: 16px; transition: transform 0.2s; }
        .game-count { background: rgba(0,0,0,0.08); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }

        .combo-badge {
            background: linear-gradient(135deg, #ff9500, #ff3b30);
            color: white; padding: 2px 8px; border-radius: 12px;
            font-size: 10px; font-weight: 800; display: none;
            white-space: nowrap; animation: bounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounce { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .content { padding: 20px; position: relative; }

        .back-btn {
            position: absolute; top: 10px; left: 10px;
            background: #000; color: white; border: none;
            border-radius: 6px; width: 30px; height: 30px;
            cursor: pointer; font-size: 18px; display: flex;
            align-items: center; justify-content: center; z-index: 20;
        }

        .btn-show-table {
            background: #000; color: #fff; border: none;
            padding: 12px 25px; border-radius: 12px;
            font-weight: 700; cursor: pointer; margin-bottom: 20px;
            animation: pulse-black 2s infinite;
        }

        @keyframes pulse-black {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 0, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 0, 0, 0); }
        }

        .itc-select { border: 2px solid transparent; border-radius: 12px; transition: all 0.3s ease; margin-bottom: 8px; }
        .itc-select.selected-mode { border-color: var(--win-accent); box-shadow: 0 0 10px rgba(0, 122, 255, 0.3); }
        .itc-select__toggle {
            width: 100%; padding: 10px 15px; background: #fff; color: #000;
            border: 1px solid #ddd; border-radius: 10px; cursor: pointer;
            font-weight: 500; font-size: 14px; display: flex; align-items: center;
        }

        .mode-num {
            background: #eee; width: 22px; height: 22px; display: flex;
            align-items: center; justify-content: center; border-radius: 50%;
            margin-right: 12px; font-size: 11px; font-weight: 700;
        }

        .btn-play-container { display: flex; justify-content: center; width: 100%; gap: 10px; }
        .btn-play, .btn-restart, .btn-next {
            background: #000; color: white; border: none; border-radius: 8px;
            padding: 8px 25px; font-size: 14px; font-weight: 600;
            cursor: pointer; margin-top: 15px;
        }
        .btn-next { background: var(--win-success); }

        .table-scroll-area { padding: 15px; overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 2px; font-size: 10px; text-align: center; }
        td { padding: 3px; border-radius: 2px; }
        .val-top { font-weight: 700; color: #000; background: rgba(255,255,255,0.6); }
        .val-bottom { color: #333; background: rgba(240,240,240,0.5); }
        .highlight-cell { background-color: rgba(0,0,0,0.1) !important; color: #000000 !important; }

        #game-screen { display: none; flex-direction: column; align-items: center; gap: 15px; padding-top: 20px; }
        .target-number { font-size: 60px; font-weight: 800; color: #1d1d1f; }
        .target-number.end-status { font-size: 35px; }

        .mistakes-container {
            width: 100%; margin-top: 10px; padding: 10px; background: rgba(255, 59, 48, 0.1);
            border-radius: 10px; font-size: 13px; color: #d32f2f;
        }

        .input-group { position: relative; }

        input[type="text"] {
            width: 100px; padding: 12px; border: 2px solid #ddd; border-radius: 12px;
            font-size: 24px; text-align: center; outline: none;

        .history { width: 100%; height: 100px; overflow-y: auto; margin-top: 15px; border-top: 1px solid rgba(0,0,0,0.05); }
        .history-list { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; padding-top: 10px; }
        .history-item { background: rgba(0,0,0,0.05); padding: 3px 8px; border-radius: 5px; font-size: 11px; }

        .hidden { display: none !important; }
        input.correct { border-color: var(--win-success); background: #eaffef; }
        input.wrong { border-color: var(--win-error); animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        
        .bubble-feedback {
            position: fixed;
            color: #34c759;
            font-weight: 800;
            font-size: 32px;
            pointer-events: none;
            z-index: 10000;
            animation: floatBubble 2.5s ease-out forwards;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        @keyframes floatBubble {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.2); opacity: 0; }
        }

        .mode-separator { height: 2px; background: #000; margin: 5px 0; border-radius: 2px; opacity: 0.8; }
    </style>
</head>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `self.addEventListener('fetch', function(event) { event.respondWith(fetch(event.request)); });`;
            const blob = new Blob([swCode], {type: 'text/javascript'});
            const url = URL.createObjectURL(blob);
            navigator.serviceWorker.register(url);
        });
    }

    const data = [
        [1.01, 11], [1.02, 9.9], [1.03, 9.05], [1.04, 8.35], [1.05, 7.77], [1.06, 7.25], [1.07, 6.8], [1.08, 6.45], [1.09, 6.1], [1.1, 5.8], [1.11, 5.55], [1.12, 5.3], [1.13, 5.1], [1.14, 4.9], [1.15, 4.7], [1.16, 4.55], [1.17, 4.4], [1.18, 4.2], [1.19, 4.15], [1.2, 4],
        [1.21, 3.9], [1.22, 3.8], [1.23, 3.7], [1.24, 3.6], [1.25, 3.55], [1.26, 3.45], [1.27, 3.4], [1.28, 3.35], [1.29, 3.25], [1.3, 3.2], [1.31, 3.15], [1.32, 3.1], [1.33, 3], [1.34, 2.95], [1.35, 2.9], [1.36, 2.89], [1.37, 2.85], [1.38, 2.8], [1.39, 2.75], [1.4, 2.7],
        [1.41, 2.69], [1.42, 2.65], [1.43, 2.6], [1.44, 2.59], [1.45, 2.55], [1.46, 2.52], [1.47, 2.5], [1.48, 2.45], [1.49, 2.44], [1.5, 2.4], [1.51, 2.39], [1.52, 2.35], [1.53, 2.34], [1.54, 2.32], [1.55, 2.3], [1.56, 2.27], [1.57, 2.25], [1.58, 2.23], [1.59, 2.21], [1.6, 2.2],
        [1.61, 2.17], [1.62, 2.15], [1.63, 2.14], [1.64, 2.12], [1.65, 2.1], [1.66, 2.09], [1.67, 2.07], [1.68, 2.05], [1.69, 2.04], [1.7, 2], [1.71, 1.99], [1.72, 1.98], [1.73, 1.97], [1.74, 1.96], [1.75, 1.95], [1.76, 1.94], [1.77, 1.93], [1.78, 1.92], [1.79, 1.91], [1.8, 1.9],
        [1.81, 1.89], [1.82, 1.88], [1.83, 1.87], [1.84, 1.86], [1.85, 1.85]
    ];

    let lives = 3;
    let gamesPlayed = 1;
    let comboCount = 0;
    let originalPool = [], activePool = [], currentPair = null;
    let mistakes = [];
    let currentModeLabel = "";
    let lastStartIndex = -1;
    let lastRowIndex = -1;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playPlopSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    function generateTable() {
        const table = document.getElementById('html-data-table');
        let html = '';
        for (let i = 0; i < data.length; i += 20) {
            let chunk = data.slice(i, i + 20);
            html += '<tr>' + chunk.map((d, idx) => `<td class="val-top ${(i+idx+1)%5===0?'highlight-cell':''}">${d[0]}</td>`).join('') + '</tr>';
            html += '<tr>' + chunk.map((d, idx) => `<td class="val-bottom ${(i+idx+1)%5===0?'highlight-cell':''}">${d[1]}</td>`).join('') + '</tr>';
            html += '<tr style="height:8px"><td colspan="20"></td></tr>';
        }
        table.innerHTML = html;
    }
    generateTable();

    function showProfitTable() {
        document.getElementById('profit-table').style.display = 'block';
        document.getElementById('table-toggle-btn').style.display = 'none';
    }

    function fillOptions() {
        const opt5 = document.getElementById('opt-5');
        let count = 1;
        for(let i=0; i<85; i+=5) {
            let endIdx = Math.min(i + 5, 85);
            let label = `${data[i][0]} - ${data[endIdx-1][0]}`;
            let fullLabel = `${count}) ${label}`;
            let div = document.createElement('div');
            div.style.padding = '8px'; div.style.cursor = 'pointer'; div.style.borderBottom = '1px solid #eee';
            div.innerHTML = `<span style="color:#888; margin-right:5px;">${count})</span> ${label}`;
            div.onclick = (e) => { e.stopPropagation(); lastStartIndex = i; lastRowIndex = -1; selectRange(i, endIdx, fullLabel, 'mode-5'); };
            opt5.appendChild(div);
            
            if (count % 4 === 0 && i + 5 < 85) {
                let sep = document.createElement('div');
                sep.className = 'mode-separator';
                opt5.appendChild(sep);
            }
            count++;
        }
        
        const optRow = document.getElementById('opt-row');
        const ranges = [[0,20], [20,40], [40,60], [60,85]];
        ranges.forEach((r, idx) => {
            let label = `Տող ${idx+1} (${data[r[0]][0]}-${data[r[1]-1][0]})`;
            let div = document.createElement('div');
            div.style.padding = '8px'; div.style.cursor = 'pointer'; div.style.borderBottom = '1px solid #eee';
            div.innerHTML = `<span style="color:#888; margin-right:5px;">${idx+1})</span> ${label}`;
            div.onclick = (e) => { e.stopPropagation(); lastStartIndex = -1; lastRowIndex = idx; selectRange(r[0], r[1], label, 'mode-row'); };
            optRow.appendChild(div);
        });

        let blackLabel = "Սևացվածներ";
        let blackDiv = document.createElement('div');
        blackDiv.style.padding = '8px'; blackDiv.style.cursor = 'pointer'; blackDiv.style.fontWeight = 'bold';
        blackDiv.innerHTML = `<span style="color:#888; margin-right:5px;">5)</span> ${blackLabel}`;
        blackDiv.onclick = (e) => { 
            e.stopPropagation(); 
            lastStartIndex = -1; 
            lastRowIndex = 4;
            const blackPool = data.filter((_, index) => (index + 1) % 5 === 0);
            originalPool = blackPool;
            currentModeLabel = blackLabel;
            document.querySelectorAll('.itc-select').forEach(el => el.classList.remove('selected-mode'));
            document.getElementById('mode-row').classList.add('selected-mode');
            document.getElementById('label-row').innerText = blackLabel;
            toggleDropdown('opt-row');
        };
        optRow.appendChild(blackDiv);
    }
    fillOptions();

    function toggleDropdown(id) {
        document.querySelectorAll('.itc-select__dropdown').forEach(d => { if(d.id !== id) d.classList.add('hidden'); });
        document.getElementById(id).classList.toggle('hidden');
    }

    function selectRange(start, end, label, parentId) {
        originalPool = data.slice(start, end);
        currentModeLabel = label;
        document.querySelectorAll('.itc-select').forEach(el => el.classList.remove('selected-mode'));
        document.getElementById(parentId).classList.add('selected-mode');
        if(parentId === 'mode-5') document.getElementById('label-5').innerText = label;
        if(parentId === 'mode-row') document.getElementById('label-row').innerText = label;
        document.querySelectorAll('.itc-select__dropdown').forEach(d => d.classList.add('hidden'));
    }

    function goToSetup() {
        document.getElementById('setup-screen').classList.remove('hidden');
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('game-status').classList.add('hidden');
        document.getElementById('current-mode-display').classList.add('hidden');
        document.getElementById('back-to-setup').classList.add('hidden');
        document.getElementById('table-toggle-btn').style.display = 'inline-block';
        comboCount = 0;
    }

    function initGame() {
        if (originalPool.length === 0) return alert("Խնդրում ենք ընտրել ռեժիմը!");
        document.getElementById('profit-table').style.display = 'none';
        document.getElementById('table-toggle-btn').style.display = 'none';
        lives = 3;
        comboCount = 0;
        mistakes = [];
        updateUI();
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').style.display = 'flex';
        document.getElementById('game-status').classList.remove('hidden');
        document.getElementById('back-to-setup').classList.remove('hidden');
        const modeDisplay = document.getElementById('current-mode-display');
        modeDisplay.innerText = currentModeLabel;
        modeDisplay.classList.remove('hidden');
        activePool = [...originalPool];
        document.getElementById('history-list').innerHTML = '';
        document.getElementById('progress-bar').style.width = '0%';
        document.getElementById('target-display').classList.remove('end-status');
        document.getElementById('input-area').classList.remove('hidden');
        document.getElementById('end-buttons').classList.add('hidden');
        nextRound();
    }

    function updateUI() {
        document.getElementById('hearts-display').innerText = "❤️".repeat(lives);
        document.getElementById('count-display').innerText = `Խաղ: ${gamesPlayed}`;
        
        const comboEl = document.getElementById('combo-display');
        if (comboCount >= 2) {
            comboEl.innerText = `🔥 ${comboCount}`;
            comboEl.style.display = 'block';
        } else {
            comboEl.style.display = 'none';
        }
    }

    function nextRound() {
        const progress = ((originalPool.length - activePool.length) / originalPool.length) * 100;
        document.getElementById('progress-bar').style.width = progress + '%';
        if (activePool.length === 0) return endGame(true);
        const randomIndex = Math.floor(Math.random() * activePool.length);
        currentPair = activePool.splice(randomIndex, 1)[0];
        const showTop = Math.random() > 0.5;
        const displayVal = showTop ? currentPair[0] : currentPair[1];
        const targetVal = showTop ? currentPair[1] : currentPair[0];
        const display = document.getElementById('target-display');
        display.innerText = displayVal;
        display.dataset.answer = targetVal;
        const input = document.getElementById('user-input');
        input.value = ''; input.className = ''; input.focus();
    }

    function showBubbleFeedback() {
        const inputArea = document.getElementById('input-area');
        const rect = inputArea.getBoundingClientRect();
        const posX = Math.random() > 0.5 ? rect.left : rect.right;
        const posY = rect.top;
        const bubble = document.createElement('div');
        bubble.className = 'bubble-feedback';
        bubble.innerText = "+1";
        bubble.style.left = posX + 'px';
        bubble.style.top = posY + 'px';
        document.body.appendChild(bubble);
        setTimeout(() => bubble.remove(), 2500);
        playPlopSound();
    }

    function checkAnswer() {
        const input = document.getElementById('user-input');
        const display = document.getElementById('target-display');
        const userAnswer = input.value.trim().replace(',', '.');
        const correctAnswer = String(display.dataset.answer);
        
        if (userAnswer === correctAnswer) {
            input.classList.add('correct');
            comboCount++;
            updateUI();
            showBubbleFeedback();
            addToHistory(display.innerText, correctAnswer);
            setTimeout(nextRound, 600);
        } else {
            lives--;
            comboCount = 0;
            if (navigator.vibrate) navigator.vibrate(500);
            mistakes.push(`${display.innerText} ➔ ${correctAnswer}`);
            updateUI();
            input.classList.add('wrong');
            setTimeout(() => input.classList.remove('wrong'), 600);
            if(lives <= 0) endGame(false);
        }
    }

    function endGame(win) {
        const display = document.getElementById('target-display');
        display.classList.add('end-status');
        display.innerText = win ? "ՀԱՂԹԱՆԱԿ" : "ՊԱՐՏՈՒԹՅՈՒՆ";
        if (mistakes.length > 0) {
            const list = document.getElementById('history-list');
            const mContainer = document.createElement('div');
            mContainer.className = 'mistakes-container';
            mContainer.innerHTML = `<strong>Սխալներիդ ուղղումը:</strong><br>${mistakes.join('<br>')}`;
            list.prepend(mContainer);
        }
        document.getElementById('input-area').classList.add('hidden');
        document.getElementById('end-buttons').classList.remove('hidden');
        document.getElementById('restart-btn').onclick = () => { gamesPlayed++; initGame(); };
        
        const nextBtn = document.getElementById('next-btn');
        nextBtn.classList.add('hidden');

        if (lastStartIndex !== -1 && lastStartIndex + 5 < 85) {
            nextBtn.classList.remove('hidden');
            nextBtn.onclick = () => {
                lastStartIndex += 5;
                let endIdx = Math.min(lastStartIndex + 5, 85);
                let labelText = `${data[lastStartIndex][0]} - ${data[endIdx-1][0]}`;
                let count = (lastStartIndex / 5) + 1;
                selectRange(lastStartIndex, endIdx, `${count}) ${labelText}`, 'mode-5');
                gamesPlayed++;
                initGame();
            };
        } 
        else if (lastRowIndex !== -1 && lastRowIndex < 4) {
            nextBtn.classList.remove('hidden');
            nextBtn.onclick = () => {
                lastRowIndex++;
                if (lastRowIndex < 4) {
                    const ranges = [[0,20], [20,40], [40,60], [60,85]];
                    let r = ranges[lastRowIndex];
                    let label = `Տող ${lastRowIndex+1} (${data[r[0]][0]}-${data[r[1]-1][0]})`;
                    selectRange(r[0], r[1], label, 'mode-row');
                } else if (lastRowIndex === 4) {
                    const blackPool = data.filter((_, index) => (index + 1) % 5 === 0);
                    originalPool = blackPool;
                    currentModeLabel = "Սևացվածներ";
                    document.getElementById('label-row').innerText = currentModeLabel;
                }
                gamesPlayed++;
                initGame();
            };
        }
        if(win) startAutoFireworks();
    }

    function addToHistory(q, a) {
        const list = document.getElementById('history-list');
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerText = `${q} → ${a}`;
        list.prepend(div);
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });

    const canvas = document.getElementById("magicCanvas");
    const ctx = canvas.getContext("2d");
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener("resize", resize); resize();
    
    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; 
            const angle = Math.random() * Math.PI * 2;
            const force = Math.random() * 6 + 1;
            this.vx = Math.cos(angle) * force; 
            this.vy = Math.sin(angle) * force; 
            this.life = 100;
            this.color = color || `rgba(255,214,10,`;
        }
        update() { this.x += this.vx; this.y += this.vy; this.vy += 0.05; this.life -= 1.5; }
        draw() { 
            ctx.fillStyle = `${this.color}${this.life/100})`; 
            ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill(); 
        }
    }

    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    function createFirework(x, y) {
        const colors = ['rgba(255,214,10,', 'rgba(0,122,255,', 'rgba(52,199,89,', 'rgba(255,59,48,', 'rgba(175,82,222,'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        for(let i=0; i<60; i++) particles.push(new Particle(x, y, color));
    }

    function startAutoFireworks() {
        let startTime = Date.now();
        const interval = setInterval(() => {
            if (Date.now() - startTime > 5000) return clearInterval(interval);
            createFirework(Math.random() * canvas.width, Math.random() * (canvas.height * 0.7));
        }, 300); 
    }
</script>
</body>
</html>
